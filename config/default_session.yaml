project_name: epuck2_sim_real_control
robot_name: epuck2
mode: sim
sim_backend: webots
real_backend: epuck2_driver
controller_name: shared_webots_controller
policy_topic: /epuck2/cmd_vel
observation_topic: /epuck2/odom
camera_topic: /overhead_camera/pose2d
dataset_root: ./datasets
sample_rate_hz: 20.0
max_linear_velocity: 0.13
max_angular_velocity: 4.5
wheel_radius_m: 0.021
axle_length_m: 0.053
goal_tolerance_m: 0.05
linear_gain: 0.8
angular_gain: 1.5
enable_real_robot: false
require_operator_confirm: true
notes:
  - Start in Webots simulation first.
  - Use the same controller in sim and real.
  - Log matched command/status datasets before sim-real adaptation.
  - Use overhead-camera trajectories to improve real-state estimation.
